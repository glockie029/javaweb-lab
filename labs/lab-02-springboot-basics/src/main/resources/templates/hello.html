<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">thymeleaf demo</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 40px;
            line-height: 1.6;
        }
        .box {
            max-width: 720px;
            padding: 24px;
            border: 1px solid #d0d7de;
            border-radius: 12px;
            background: #f6f8fa;
        }
        code {
            background: #ffffff;
            padding: 2px 6px;
            border-radius: 6px;
        }
    </style>
</head>
<body>
<div class="box">
    <h1 th:text="${title}">thymeleaf demo</h1>
    <p>Hello, <span th:text="${name}">guest</span>.</p>
    <p th:text="${note}">this page is rendered by a template engine</p>
    <p>Template path: <code>src/main/resources/templates/hello.html</code></p>
    <p>Request example: <code>/view/hello?name=alice</code></p>
</div>
</body>
</html>
