rules:
  - id: java-mybatis-xml-dollar-substitution
    message: |
      MyBatis XML 中使用 ${...} 会直接进行字符串拼接，可能导致 SQL 注入。
      优先改为 #{...} 参数绑定；如果必须用于排序/列名，需配合白名单控制。
    severity: ERROR
    languages:
      - generic
    paths:
      include:
        - "**/mapper/**/*.xml"
        - "**/*Mapper.xml"
    metadata:
      category: security
      technology:
        - mybatis
        - java
      cwe:
        - "CWE-89: Improper Neutralization of Special Elements used in an SQL Command"
      owasp:
        - "A03:2021 - Injection"
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
    pattern-regex: "\\$\\{[^}]+\\}"
